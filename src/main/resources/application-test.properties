# 基础数据源配置（ShardingSphere会覆盖这个配置）
spring.datasource.url=jdbc:mysql://localhost:3306/sharding0?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.configuration.mapUnderscoreToCamelCase=true
mybatis.type-aliases-package=com.pzp.model
mybatis.mapper-locations=classpath:mappers/*.xml

# ShardingSphere分库分表配置
spring.shardingsphere.datasource.names=sharding0,sharding1

# 数据源sharding0配置
spring.shardingsphere.datasource.sharding0.type=com.alibaba.druid.pool.DruidDataSource
spring.shardingsphere.datasource.sharding0.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.sharding0.url=jdbc:mysql://localhost:3306/sharding0?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.shardingsphere.datasource.sharding0.username=root
spring.shardingsphere.datasource.sharding0.password=123456

# 数据源sharding1配置
spring.shardingsphere.datasource.sharding1.type=com.alibaba.druid.pool.DruidDataSource
spring.shardingsphere.datasource.sharding1.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.sharding1.url=jdbc:mysql://localhost:3306/sharding1?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.shardingsphere.datasource.sharding1.username=root
spring.shardingsphere.datasource.sharding1.password=123456

# book表的分库分表规则
# 逻辑表名是 book，实际数据节点：两个数据库，每个库2张表（book0, book1）
spring.shardingsphere.rules.sharding.tables.book.actual-data-nodes=sharding$->{0..1}.book$->{0..1}

# 分库策略：根据orderId取模分库
spring.shardingsphere.rules.sharding.tables.book.database-strategy.standard.sharding-column=orderId
spring.shardingsphere.rules.sharding.tables.book.database-strategy.standard.sharding-algorithm-name=database-inline

# 分表策略：根据orderId右移1位后取模分表（避免与分库策略完全一致）
spring.shardingsphere.rules.sharding.tables.book.table-strategy.standard.sharding-column=orderId
spring.shardingsphere.rules.sharding.tables.book.table-strategy.standard.sharding-algorithm-name=table-inline

# 分库算法配置：orderId % 2
spring.shardingsphere.rules.sharding.sharding-algorithms.database-inline.type=INLINE
spring.shardingsphere.rules.sharding.sharding-algorithms.database-inline.props.algorithm-expression=sharding$->{orderId % 2}

# 分表算法配置：(orderId >> 1) & 1，使用位运算确保数据均匀分布到所有表
spring.shardingsphere.rules.sharding.sharding-algorithms.table-inline.type=INLINE
spring.shardingsphere.rules.sharding.sharding-algorithms.table-inline.props.algorithm-expression=book$->{(orderId >> 1) & 1}

# 显示SQL日志（开发环境建议开启）
spring.shardingsphere.props.sql-show=true

