spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.configuration.mapUnderscoreToCamelCase=true
spring.thymeleaf.cache=false

spring.shardingsphere.datasource.names=db0,db1
spring.shardingsphere.datasource.db0.type=com.alibaba.druid.pool.DruidDataSource
spring.shardingsphere.datasource.db0.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.db0.url=jdbc:mysql://localhost:3306/sharding0
spring.shardingsphere.datasource.db0.username=root
spring.shardingsphere.datasource.db0.password=123456
spring.shardingsphere.datasource.db1.type=com.alibaba.druid.pool.DruidDataSource
spring.shardingsphere.datasource.db1.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.db1.url=jdbc:mysql://localhost:3306/sharding1
spring.shardingsphere.datasource.db1.username=root
spring.shardingsphere.datasource.db1.password=123456
spring.shardingsphere.rules.sharding.tables.book.actual-data-nodes=db$->{0..1}.book_$->{0..1}
spring.shardingsphere.rules.sharding.tables.book.database-strategy.standard.sharding-column=id
spring.shardingsphere.rules.sharding.tables.book.database-strategy.standard.sharding-algorithm-name=book_db_alg
spring.shardingsphere.rules.sharding.sharding-algorithms.book_db_alg.type=MOD
spring.shardingsphere.rules.sharding.sharding-algorithms.book_db_alg.props.sharding-count=2
spring.shardingsphere.rules.sharding.tables.book.table-strategy.standard.sharding-column=id
spring.shardingsphere.rules.sharding.tables.book.table-strategy.standard.algorithm-name=book_tbl_alg
spring.shardingsphere.rules.sharding.sharding-algorithms.book_tbl_alg.type=INLINE
spring.shardingsphere.rules.sharding.sharding-algorithms.book_tbl_alg.props.algorithm-expression=book_$->{id % 2}
spring.shardingsphere.rules.sharding.key-generators.alg_snowflake.type=SNOWFLAKE
spring.shardingsphere.rules.sharding.key-generators.alg_snowflake.props.worker.id=1
spring.shardingsphere.rules.sharding.tables.book.key-generate-strategy.column=id
spring.shardingsphere.rules.sharding.tables.book.key-generate-strategy.key-generator-name=alg_snowflake

